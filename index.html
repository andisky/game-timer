<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a"> <!-- Angepasst an den neuen Hintergrund -->

<style>
  /* Grundlegendes Reset & Hintergrund */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    /* Ein moderner, edler Farbverlauf (Dunkelblau/Grau) */
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* Nutzt die Original-Schriftart des Handys (z.B. San Francisco auf dem iPhone) */
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; /* Verhindert Wackeln/Scrollen auf dem iPhone */
  }

  /* Der Haupt-Kasten (Glassmorphism-Effekt) */
  .app-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 32px;
    padding: 40px 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    width: 90%;
    max-width: 380px;
  }

  /* SETUP SCREEN STYLE */
  #setup-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #94a3b8;
    font-weight: 600;
  }

  input[type="number"] {
    font-size: 36px;
    font-weight: 700;
    padding: 15px;
    width: 120px;
    text-align: center;
    background: rgba(0, 0, 0, 0.2);
    color: white;
    border: 2px solid transparent;
    border-radius: 16px;
    outline: none;
    transition: all 0.3s ease;
  }

  /* Leuchteffekt beim Tippen ins Feld */
  input[type="number"]:focus {
    border-color: #10b981;
    background: rgba(16, 185, 129, 0.05);
    box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
  }

  /* Pfeile im Nummernfeld (iOS/Chrome) verstecken für cleane Optik */
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0; 
  }

  /* Button Styling */
  button {
    font-size: 18px;
    padding: 18px;
    margin-top: 15px;
    width: 100%;
    cursor: pointer;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    border-radius: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
    transition: all 0.2s ease;
  }

  /* Animation beim Drücken */
  button:active {
    transform: scale(0.95);
    box-shadow: 0 5px 10px -5px rgba(16, 185, 129, 0.4);
  }

  /* TIMER SCREEN STYLE */
  #timer-view {
    display: none; 
    flex-direction: column;
    align-items: center;
  }

  #mode {
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #10b981;
    font-weight: 700;
    margin-bottom: -15px; /* Rückt den Text näher an die große Zahl */
  }

  #timer {
    font-size: 110px;
    font-weight: 800;
    margin: 20px 0 0 0;
    font-variant-numeric: tabular-nums; /* Sorgt dafür, dass die Zahlen beim Ticken nicht springen */
    letter-spacing: -3px;
    text-shadow: 0 0 40px rgba(255, 255, 255, 0.1); /* Sanfter Glow um die Zahlen */
  }
</style>

</head>
<body>

<!-- Der Kasten um die App -->
<div class="app-card">

  <!-- SETUP SCREEN -->
  <div id="setup-view">
    <div class="input-group">
      <label>Game Time</label>
      <input type="number" id="gameInput" value="12" min="1">
    </div>
    
    <div class="input-group">
      <label>Break Time</label>
      <input type="number" id="breakInput" value="3" min="1">
    </div>

    <button onclick="start()">Start</button>
  </div>

  <!-- TIMER SCREEN -->
  <div id="timer-view">
    <div id="mode">Ready</div>
    <div id="timer">00:00</div>
  </div>

</div>

<!-- Audio-Elemente -->
<audio id="startSound" src="startsound.mp3"></audio>
<audio id="endSound" src="endsound.mp3"></audio>

<!-- HIER laden wir deine externe app.js -->
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>

</body>
</html>
