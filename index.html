<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  #setup-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  label {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 18px;
    color: #ccc;
    gap: 8px;
  }

  input[type="number"] {
    font-size: 24px;
    padding: 10px;
    width: 80px;
    text-align: center;
    background: #222;
    color: white;
    border: 2px solid #444;
    border-radius: 8px;
    outline: none;
  }

  #timer-view {
    display: none; 
    flex-direction: column;
    align-items: center;
  }

  #mode {
    font-size: 24px;
    opacity: 0.7;
  }

  #timer {
    font-size: 90px;
    margin: 20px;
    font-variant-numeric: tabular-nums;
  }

  button {
    font-size: 20px;
    padding: 15px 40px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
  }
</style>

</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-view">
  <label>
    Game time (Minuten)
    <input type="number" id="gameInput" value="12" min="1">
  </label>
  
  <label>
    Break time (Minuten)
    <input type="number" id="breakInput" value="3" min="1">
  </label>

  <button onclick="start()">Start</button>
</div>

<!-- TIMER SCREEN -->
<div id="timer-view">
  <div id="mode">Ready</div>
  <div id="timer">00:00</div>
</div>

<!-- Audio-Elemente -->
<audio id="startSound" src="startsound.mp3"></audio>
<audio id="endSound" src="endsound.mp3"></audio>

<!-- HIER laden wir deine externe app.js -->
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>

</body>
</html>
