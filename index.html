<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Game Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* --- New Settings Styles --- */
#settings {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-bottom: 30px;
}

label {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 18px;
  color: #ccc;
  gap: 8px;
}

input[type="number"] {
  font-size: 24px;
  padding: 10px;
  width: 80px;
  text-align: center;
  background: #222;
  color: white;
  border: 2px solid #444;
  border-radius: 8px;
  outline: none;
}

input[type="number"]:focus {
  border-color: #4CAF50;
}
/* ------------------------- */

#timer-view {
  display: none; /* Hidden until start is clicked */
  flex-direction: column;
  align-items: center;
}

#mode {
  font-size: 24px;
  opacity: 0.7;
}

#timer {
  font-size: 90px;
  margin: 20px;
  font-variant-numeric: tabular-nums; /* Keeps numbers from jumping around */
}

button {
  font-size: 20px;
  padding: 15px 40px;
  cursor: pointer;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

button:active {
  background-color: #3e8e41;
}
</style>

</head>

<body>

<!-- Settings UI -->
<div id="settings">
  <label>
    Game time (minutes)
    <input type="number" id="gameInput" value="12" min="1">
  </label>
  
  <label>
    Break time (minutes)
    <input type="number" id="breakInput" value="3" min="1">
  </label>

  <button onclick="startApp()">Start</button>
</div>

<!-- Timer UI -->
<div id="timer-view">
  <div id="mode">Ready</div>
  <div id="timer">00:00</div>
</div>

<script src="app.js"></script>

<script>
// Helper function to transition the UI and trigger your main JS
function startApp() {
  // Hide the inputs and button
  document.getElementById("settings").style.display = "none";
  // Show the giant timer
  document.getElementById("timer-view").style.display = "flex";
  
  // Call the start() function from your app.js
  start(); 
}

// Service Worker Registration
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(err => {
    console.log("Service Worker registration failed:", err);
  });
}
</script>

</body>
</html>
